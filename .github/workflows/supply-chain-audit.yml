name: Supply Chain Risk Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: supply-chain-risk-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan PR execution risks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Select audit scripts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/supply-chain"

          if git cat-file -e "$BASE_SHA:scripts/supply_chain_audit.py" &&
             git cat-file -e "$BASE_SHA:scripts/supply_chain_comment.py"; then
            git show "$BASE_SHA:scripts/supply_chain_audit.py" > "$RUNNER_TEMP/supply-chain/audit.py"
            git show "$BASE_SHA:scripts/supply_chain_comment.py" > "$RUNNER_TEMP/supply-chain/comment.py"
          else
            echo "::error::Base branch does not contain supply-chain risk guard scripts."
            exit 2
          fi

          echo "AUDIT_SCRIPT=$RUNNER_TEMP/supply-chain/audit.py" >> "$GITHUB_ENV"
          echo "COMMENT_SCRIPT=$RUNNER_TEMP/supply-chain/comment.py" >> "$GITHUB_ENV"

      - name: Scan PR diff
        id: scan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          python "$AUDIT_SCRIPT" scan --base "$BASE_SHA" --head "$HEAD_SHA" --findings "$RUNNER_TEMP/findings.md"
          SCAN_EXIT="$?"
          set -e

          if [ "$SCAN_EXIT" -eq 1 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          elif [ "$SCAN_EXIT" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            exit "$SCAN_EXIT"
          fi

      - name: Sync risk guard comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SCAN_FOUND: ${{ steps.scan.outputs.found }}
          COMMENT_MARKER: "<!-- pandas-booster:supply-chain-risk-guard -->"
        run: |
          set -euo pipefail
          if [ "$SCAN_FOUND" = "true" ]; then
            python "$COMMENT_SCRIPT" sync \
              --pr-number "$PR_NUMBER" \
              --head-sha "$HEAD_SHA" \
              --state finding \
              --findings "$RUNNER_TEMP/findings.md"
          else
            python "$COMMENT_SCRIPT" sync \
              --pr-number "$PR_NUMBER" \
              --head-sha "$HEAD_SHA" \
              --state clear
          fi

      - name: Fail on risk findings
        if: steps.scan.outputs.found == 'true'
        run: |
          echo "::error::Supply-chain risk guard found executable startup or encoded command patterns."
          exit 1
