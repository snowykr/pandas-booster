name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Quality (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Set PYO3_PYTHON
        run: |
          python -c "import sys, os; open(os.environ['GITHUB_ENV'], 'a').write(f'PYO3_PYTHON={sys.executable}\n')"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test

  build-and-test-full:
    name: Build & Test (Full Matrix)
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - uses: Swatinem/rust-cache@v2

      - name: Set PYO3_PYTHON
        run: |
          python -c "import sys, os; open(os.environ['GITHUB_ENV'], 'a').write(f'PYO3_PYTHON={sys.executable}\n')"

      - name: Install build dependencies
        run: pip install "maturin>=1.4,<2.0"

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install wheel and test dependencies
        run: |
          python -c "import glob, subprocess, sys; wheels = glob.glob('dist/*.whl'); (print(f'Error: Found {len(wheels)} wheels: {wheels}') or sys.exit(1)) if len(wheels) != 1 else None; w = wheels[0]; print(f'Installing {w}'); subprocess.check_call([sys.executable, '-m', 'pip', 'install', w])"
          pip install pytest numpy pandas

      - name: Run tests
        run: pytest tests/ -v

      - name: Upload wheels
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  build-and-test-quick:
    name: Build & Test (Quick)
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref != 'main')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - uses: Swatinem/rust-cache@v2

      - name: Set PYO3_PYTHON
        run: |
          python -c "import sys, os; open(os.environ['GITHUB_ENV'], 'a').write(f'PYO3_PYTHON={sys.executable}\n')"

      - name: Install build dependencies
        run: pip install "maturin>=1.4,<2.0"

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install wheel and test dependencies
        run: |
          python -c "import glob, subprocess, sys; wheels = glob.glob('dist/*.whl'); (print(f'Error: Found {len(wheels)} wheels: {wheels}') or sys.exit(1)) if len(wheels) != 1 else None; w = wheels[0]; print(f'Installing {w}'); subprocess.check_call([sys.executable, '-m', 'pip', 'install', w])"
          pip install pytest numpy pandas

      - name: Run tests
        run: pytest tests/ -v
