name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Static Validation (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Set PYO3_PYTHON
        run: |
          python -c "import sys, os; open(os.environ['GITHUB_ENV'], 'a').write(f'PYO3_PYTHON={sys.executable}\n')"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test

  python-quality:
    name: Python Quality Validation (basedpyright, ruff, metadata)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "basedpyright>=1.37.1" "pandas-stubs>=2.0.0" pandas numpy "ruff>=0.9.0"

      - name: Run basedpyright
        run: basedpyright --project pyrightconfig.json

      - name: Run ruff
        run: ruff check python tests scripts benches

      - name: Validate release metadata contract
        run: python scripts/check_release_contract.py metadata

      - name: Validate publish workflow contract
        run: python scripts/check_release_contract.py workflow --file .github/workflows/publish.yml

  build-wheel-smoke:
    name: Build Wheel Smoke
    needs:
      - rust-checks
      - python-quality
    if: >
      github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - uses: Swatinem/rust-cache@v2

      - name: Set PYO3_PYTHON
        run: |
          python -c "import sys, os; open(os.environ['GITHUB_ENV'], 'a').write(f'PYO3_PYTHON={sys.executable}\n')"

      - name: Install build dependencies
        run: pip install "maturin>=1.13,<2.0"

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Upload smoke wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-wheel-py311-ubuntu
          path: dist/*.whl

  test-wheel-smoke:
    name: Test Wheel Smoke
    needs:
      - build-wheel-smoke
    if: >
      github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Download smoke wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: smoke-wheel-py311-ubuntu
          path: dist/

      - name: Install wheel and test dependencies
        run: |
          python -c "import glob, subprocess, sys; wheels = glob.glob('dist/*.whl'); (print(f'Error: Found {len(wheels)} wheels: {wheels}') or sys.exit(1)) if len(wheels) != 1 else None; w = wheels[0]; print(f'Installing {w}'); subprocess.check_call([sys.executable, '-m', 'pip', 'install', w])"
          pip install pytest numpy pandas

      - name: Run tests
        run: pytest tests/ -v --strict-markers -m "not stress"

  release-matrix:
    name: Release Matrix
    needs:
      - rust-checks
      - python-quality
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - uses: Swatinem/rust-cache@v2

      - name: Set PYO3_PYTHON
        run: |
          python -c "import sys, os; open(os.environ['GITHUB_ENV'], 'a').write(f'PYO3_PYTHON={sys.executable}\n')"

      - name: Install build dependencies
        run: pip install "maturin>=1.13,<2.0"

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install wheel and test dependencies
        run: |
          python -c "import glob, subprocess, sys; wheels = glob.glob('dist/*.whl'); (print(f'Error: Found {len(wheels)} wheels: {wheels}') or sys.exit(1)) if len(wheels) != 1 else None; w = wheels[0]; print(f'Installing {w}'); subprocess.check_call([sys.executable, '-m', 'pip', 'install', w])"
          pip install pytest numpy pandas

      - name: Run tests
        run: pytest tests/ -v --strict-markers -m "not stress"

      - name: Upload wheels
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  build-and-test-quick:
    name: Build & Test (Quick)
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref != 'main')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - uses: Swatinem/rust-cache@v2

      - name: Set PYO3_PYTHON
        run: |
          python -c "import sys, os; open(os.environ['GITHUB_ENV'], 'a').write(f'PYO3_PYTHON={sys.executable}\n')"

      - name: Install build dependencies
        run: pip install "maturin>=1.13,<2.0"

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install wheel and test dependencies
        run: |
          python -c "import glob, subprocess, sys; wheels = glob.glob('dist/*.whl'); (print(f'Error: Found {len(wheels)} wheels: {wheels}') or sys.exit(1)) if len(wheels) != 1 else None; w = wheels[0]; print(f'Installing {w}'); subprocess.check_call([sys.executable, '-m', 'pip', 'install', w])"
          pip install pytest numpy pandas

      - name: Run tests
        run: pytest tests/ -v --strict-markers -m "not stress"

  stress-tests:
    name: Stress Tests (Determinism)
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && contains(github.event.pull_request.labels.*.name, 'run-stress')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - uses: Swatinem/rust-cache@v2

      - name: Set PYO3_PYTHON
        run: |
          python -c "import sys, os; open(os.environ['GITHUB_ENV'], 'a').write(f'PYO3_PYTHON={sys.executable}\n')"

      - name: Install build dependencies
        run: pip install "maturin>=1.13,<2.0"

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install wheel and test dependencies
        run: |
          python -c "import glob, subprocess, sys; wheels = glob.glob('dist/*.whl'); (print(f'Error: Found {len(wheels)} wheels: {wheels}') or sys.exit(1)) if len(wheels) != 1 else None; w = wheels[0]; print(f'Installing {w}'); subprocess.check_call([sys.executable, '-m', 'pip', 'install', w])"
          pip install pytest numpy pandas

      - name: Run determinism stress tests
        run: pytest tests/test_sort_false_determinism.py -v --strict-markers -m stress
